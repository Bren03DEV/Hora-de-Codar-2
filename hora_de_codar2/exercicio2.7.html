<!DOCTYPE html>

    <script>

        //7.Faça um programa que leia 6 números que o usuário vai informar. Todos os números lidos com valor inferior a 72 devem ser somados.
        // Escreva o valor final da soma efetuada e também todos valores que o usuário informou.  

        alert("Digite seis valores para exibirmos a soma dos valores inferiores a 72 e os valores informados");

var valores = [];
var soma = 0;

for (var i = 0; i < 6; i++) {
    valores[i] = parseFloat(prompt("Digite o " + (i + 1) + "º valor:"));

    if (valores[i] < 72) {
        soma += valores[i];
    }
}

alert("A soma dos valores inferiores a 72 é: " + soma);
alert("Os valores informados foram: " + valores.join(", "));

        


    </script>
