<!DOCTYPE html>

    <meta charset="UTF-8">

    <script>

//4. Faça um programa que leia 3 valores informados pelo usuário (considere que não serão informados valores iguais)
//  e escrever a soma dos 2 maiores.

        var valor1 = parseFloat(prompt("Digite o primeiro valor: "));
        var valor2 = parseFloat(prompt("Digite o segundo valor: "));
        var valor3 = parseFloat(prompt("Digite o terceiro valor: "));

        if (valor1 > valor2 && valor1 > valor3){
            alert("A soma dos dois maiores valores é: " + (valor1 + Math.max(valor2, valor3)));

        } else if (valor2 > valor3 && valor2 > valor1){
            alert("A soma dos dois maiores valores é: " + (valor2 + Math.max(valor1, valor3)));

        } else if (valor3 > valor1 && valor3 > valor2){
            alert("A soma dos dois maiores valores é: " + (valor3 + Math.max(valor1, valor2)));
        
        }
                
    </script>
