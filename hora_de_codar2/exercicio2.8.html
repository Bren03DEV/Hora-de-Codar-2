<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>

        //8. Escreva um programa que calcule a média de quatro números informados pelo usuário, mas somente se esses números forem maiores que 0 e menores que 10. 
        // No final, se a média for maior que cinco o usuário receberá uma mensagem "Você passou no teste". 
        // Em qualquer outra situação, ele receberá uma mensagem de "tente novamente"
        
        
        var num1 = parseFloat(prompt("Digite o primeiro número: "));
        var num2 = parseFloat(prompt("Digite o segundo número: "));
        var num3 = parseFloat(prompt("Digite o terceiro número: "));
        var num4 = parseFloat(prompt("Digite o quarto número: "));
        var media = 10;

        if (num1 > 0 && num1 < 10 
            && num2 > 0 && num2 < 10 
            && num3 > 0 && num3 < 10 
            && num4 > 0 && num4 < 10){
            media = (num1 + num2 + num3 + num4) / 4;

            alert("A média dos números é: " + media);

            if (media >= 5){
                alert("Você passou no teste");
            } else {
                alert("Tente novamente");
            }

        } else {
            alert("Os números devem ser maiores que 0 e menores que 10");
        }
    </script>
    
</head>

</body>
</html>
