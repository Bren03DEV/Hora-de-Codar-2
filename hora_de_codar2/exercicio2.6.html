    <script>
        //6. Faça um programa que receba quatro valores informados pelo usuário,
        //  mas informe somente o primeiro, o último e o maior de todos eles
        //  (considere que todos os números informados serão diferentes)

        alert("Digite quatro valores para exibirmos o primeiro, o último e o maior de todos eles");

        var valor1 = parseFloat(prompt("Digite o primeiro valor: "));
        var valor2 = parseFloat(prompt("Digite o segundo valor: "));
        var valor3 = parseFloat(prompt("Digite o terceiro valor: "));
        var valor4 = parseFloat(prompt("Digite o quarto valor: "));

        var maior = valor1;
        if (valor2 > maior) {
            maior = valor2;
        }
        else if (valor3 > maior) {
            maior = valor3;
        }
        else if (valor4 > maior) {
            maior = valor4;
        }
        alert("O primeiro valor informado foi: " + valor1);
        alert("O último valor informado foi: " + valor4);
        alert("O maior valor informado foi: " + maior);

    </script>
