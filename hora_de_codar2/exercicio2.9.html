<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        //9. Escreva um programa para ler o ano de nascimento de uma pessoa e escrever uma mensagem que diga se ela poderá ou não votar este ano
        //  (não é necessário considerar o mês em que ela nasceu).

        var anoNascimento = parseInt(prompt("Digite o ano de nascimento: "));
        var anoAtual = parseInt(prompt("Digite o ano atual: "));

        if (anoAtual - anoNascimento >= 16){
            alert("Voce pode votar!");
        } else 
            alert("Voce náo pode votar!");



    </script>

</head>

</body>
</html>
