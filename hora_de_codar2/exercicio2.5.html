    <script>

        //5.Faça um programa que leia 6 valores informados pelo usuário, calcule,
        // exiba os números informados e escreva a média aritmética desses valores lidos.
       
        alert("A seguir digite seis valores para exibirmos a média aritmética do mesmo");
        
        var valor1 = parseFloat(prompt("Digite o primeiro valor: "));
        var valor2 = parseFloat(prompt("Digite o segundo valor: "));
        var valor3 = parseFloat(prompt("Digite o terceiro valor: "));
        var valor4 = parseFloat(prompt("Digite o quarto valor: "));
        var valor5 = parseFloat(prompt("Digite o quinto valor: "));
        var valor6 = parseFloat(prompt("Digite o sexto valor: "));

        var media = (valor1 + valor2 + valor3 + valor4 + valor5 + valor6) / 6;

        alert("Os valores informados foram: " + valor1 + ", " + valor2 + ", " + valor3 + ", " + valor4 + ", " + valor5 + " e " + valor6);
        
        alert("A média aritmética dos valores informados é: " + media);

    

    </script>
